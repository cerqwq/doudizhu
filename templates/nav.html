<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航中心</title>
    <link rel="stylesheet" href="/ddz/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
</head>
<body class="lobby-bg">
    <div class="page-wrapper">
        <div class="card nav-header">
            <div>
                <h1 class="nav-header-title">🌐 导航中心</h1>
                <p class="nav-header-sub">欢迎，{{ username }}！选择你要玩的游戏</p>
            </div>
            <div class="nav-header-actions">
                <a href="/ddz/switch_account" class="btn btn-ghost btn-sm">切换账号</a>
                <a href="/ddz/logout" class="btn btn-red btn-sm">退出</a>
            </div>
        </div>

        <div class="nav-grid">
            <div class="nav-card" onclick="location.href='/ddz/doudizhu'">
                <div class="nav-card-icon">🃏</div>
                <div class="nav-card-title">单机斗地主</div>
                <div class="nav-card-desc">与电脑AI对战，赢取金币！</div>
                <button class="btn btn-green btn-sm" style="margin-top:16px;">开始游戏 →</button>
            </div>
            <div class="nav-card" onclick="location.href='/ddz/lobby'">
                <div class="nav-card-icon">🌐</div>
                <div class="nav-card-title">联机大厅</div>
                <div class="nav-card-desc">创建或加入房间，在线对战</div>
                <button class="btn btn-gold btn-sm" style="margin-top:16px;">进入大厅 →</button>
            </div>
            <div class="nav-card" onclick="location.href='/ddz/profile'">
                <div class="nav-card-icon">👤</div>
                <div class="nav-card-title">个人中心</div>
                <div class="nav-card-desc">查看战绩、金币和统计数据</div>
                <button class="btn btn-ghost btn-sm" style="margin-top:16px;">查看 →</button>
            </div>
            <div class="nav-card" onclick="location.href='/ddz/admin_login'">
                <div class="nav-card-icon">⚙️</div>
                <div class="nav-card-title">管理后台</div>
                <div class="nav-card-desc">管理用户数据和游戏设置</div>
                <button class="btn btn-ghost btn-sm" style="margin-top:16px;">进入 →</button>
            </div>
        </div>
    </div>
</body>
</html>
