<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link rel="stylesheet" href="/ddz/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
</head>
<body class="lobby-bg">
    <div class="page-wrapper" style="max-width:520px;">
        <div class="info-header">
            <h1>👤 个人中心</h1>
        </div>

        <div class="info-section">
            <div class="info-section-title">📋 账号信息</div>
            <div class="info-row">
                <span class="info-label">用户名</span>
                <span class="info-value" id="username">加载中...</span>
            </div>
            <div class="info-row">
                <span class="info-label">注册时间</span>
                <span class="info-value" id="createdAt">-</span>
            </div>
        </div>

        <div class="info-section">
            <div class="info-section-title">🃏 游戏数据</div>
            <div class="info-row">
                <span class="info-label">💰 金币</span>
                <span class="info-value gold" id="coins">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">🏆 胜利</span>
                <span class="info-value green" id="wins">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">💔 失败</span>
                <span class="info-value red" id="losses">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">🤝 平局</span>
                <span class="info-value" id="draws">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">📋 总场数</span>
                <span class="info-value" id="totalGames">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">📈 胜率</span>
                <span class="info-value green" id="winRate">0%</span>
            </div>
        </div>

        <div class="info-section">
            <div class="info-section-title">🚀 快速跳转</div>
            <div class="profile-nav-grid">
                <a href="/ddz/nav" class="btn btn-ghost">🏠 导航中心</a>
                <a href="/ddz/doudizhu" class="btn btn-blue">🃏 单机斗地主</a>
                <a href="/ddz/lobby" class="btn btn-green">🌐 联机大厅</a>
            </div>
        </div>
    </div>

    <script>
        fetch('/ddz/api/get_user_data')
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    const u = d.data;
                    document.getElementById('username').textContent = u.username;
                    document.getElementById('createdAt').textContent = u.created_at;
                    document.getElementById('coins').textContent = u.coins;
                    document.getElementById('wins').textContent = u.wins;
                    document.getElementById('losses').textContent = u.losses;
                    document.getElementById('draws').textContent = u.draws;
                    document.getElementById('totalGames').textContent = u.total_games;
                    document.getElementById('winRate').textContent =
                        u.total_games > 0 ? Math.round(u.wins / u.total_games * 100) + '%' : '0%';
                }
            });
    </script>
</body>
</html>
